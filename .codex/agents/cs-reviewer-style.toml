   - 現状: 現在のコード
   - 問題: なぜ規約違反か
   - 修正案: 正しいコード

### 問題なしの項目

- （検査して問題がなかった項目を列挙）
```

問題が0件の場合は「全検査項目をパスしました」と報告する。"""
